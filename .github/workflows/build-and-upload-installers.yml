name: Build And Upload Installers

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to build and publish installers for
        required: true
        type: string
      channel:
        description: Update channel to publish
        required: false
        default: stable
        type: choice
        options:
          - stable
          - prerelease

permissions:
  contents: write

env:
  R2_ENDPOINT: https://a0422396247c7b5ae116f931733ac7c8.r2.cloudflarestorage.com
  R2_BUCKET: dictafun-artifactory
  RELEASE_TAG: ${{ inputs.tag || github.event.release.tag_name }}
  RELEASE_CHANNEL: ${{ inputs.channel || (github.event.release.prerelease && 'prerelease') || 'stable' }}

jobs:
  build-macos:
    name: Build macOS DMG
    if: github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate macOS dictafun protocol
        run: |
          node -e 'const pkg=require("./package.json"); const protocols=pkg.build?.protocols; if(!Array.isArray(protocols)||protocols[0]?.schemes?.[0]!=="dictafun"){throw new Error("missing dictafun protocol")} console.log("protocol ok")'

      - name: Create runtime env file
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || secrets.VITE_API_URL }}
          VITE_DESKTOP_UPDATES_URL: ${{ vars.VITE_DESKTOP_UPDATES_URL || secrets.VITE_DESKTOP_UPDATES_URL }}
          VITE_DESKTOP_PRERELEASE_UPDATES_URL: ${{ vars.VITE_DESKTOP_PRERELEASE_UPDATES_URL || secrets.VITE_DESKTOP_PRERELEASE_UPDATES_URL }}
          VITE_DESKTOP_DOWNLOAD_BASE_URL: ${{ vars.VITE_DESKTOP_DOWNLOAD_BASE_URL || secrets.VITE_DESKTOP_DOWNLOAD_BASE_URL }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
        run: |
          set -euo pipefail
          updates_url="${VITE_DESKTOP_UPDATES_URL:-}"
          if [[ "${RELEASE_CHANNEL}" == "prerelease" ]]; then
            updates_url="${VITE_DESKTOP_PRERELEASE_UPDATES_URL:-}"
            if [[ -z "$updates_url" && -n "${VITE_DESKTOP_UPDATES_URL:-}" ]]; then
              updates_url="${VITE_DESKTOP_UPDATES_URL/desktop\/latest\/latest.json/desktop\/prerelease\/latest.json}"
              if [[ "$updates_url" == "$VITE_DESKTOP_UPDATES_URL" ]]; then
                updates_url=""
              fi
            fi
          fi

          if [[ -z "${VITE_API_URL:-}" ]]; then
            echo "Missing GitHub Actions variable: VITE_API_URL"
            exit 1
          fi
          if [[ -z "$updates_url" ]]; then
            echo "Missing GitHub Actions variable: VITE_DESKTOP_UPDATES_URL"
            exit 1
          fi

          {
            printf 'VITE_API_URL=%s\n' "$VITE_API_URL"
            printf 'VITE_DESKTOP_UPDATES_URL=%s\n' "$updates_url"
            if [[ -n "${VITE_DESKTOP_DOWNLOAD_BASE_URL:-}" ]]; then
              printf 'VITE_DESKTOP_DOWNLOAD_BASE_URL=%s\n' "$VITE_DESKTOP_DOWNLOAD_BASE_URL"
            fi
            if [[ -n "${VITE_POSTHOG_KEY:-}" ]]; then
              printf 'VITE_POSTHOG_KEY=%s\n' "$VITE_POSTHOG_KEY"
            fi
            if [[ -n "${VITE_POSTHOG_HOST:-}" ]]; then
              printf 'VITE_POSTHOG_HOST=%s\n' "$VITE_POSTHOG_HOST"
            fi
            printf 'VOXLY_DEBUG=0\n'
          } > resources/runtime.env

      - name: Prepare Apple Signing Certificate
        env:
          CERTIFICATE_LINK: ${{ secrets.CSC_LINK }}
          CERTIFICATE_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CERTIFICATE_NAME: ${{ secrets.CSC_NAME }}
        run: |
          set -euo pipefail
          if [[ -z "${CERTIFICATE_LINK:-}" || -z "${CERTIFICATE_PASSWORD:-}" ]]; then
            echo "Missing GitHub secrets: CSC_LINK and CSC_KEY_PASSWORD are required for macOS release signing"
            exit 1
          fi

          mkdir -p "$HOME/certs"
          if ! printf '%s' "$CERTIFICATE_LINK" | base64 --decode > "$HOME/certs/certs.p12" 2>/dev/null; then
            printf '%s' "$CERTIFICATE_LINK" | base64 -D > "$HOME/certs/certs.p12"
          fi
          echo "CSC_LINK=$HOME/certs/certs.p12" >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=$CERTIFICATE_PASSWORD" >> "$GITHUB_ENV"
          if [[ -n "${CERTIFICATE_NAME:-}" ]]; then
            echo "CSC_NAME=$CERTIFICATE_NAME" >> "$GITHUB_ENV"
          fi
          echo "Apple signing certificate loaded"

      - name: Prepare Apple Notarization API Key
        env:
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID_VALUE: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_VALUE: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_API_KEY_B64:-}" || -z "${APPLE_API_KEY_ID_VALUE:-}" || -z "${APPLE_API_ISSUER_VALUE:-}" ]]; then
            echo "Missing GitHub secrets: APPLE_API_KEY, APPLE_API_KEY_ID, and APPLE_API_ISSUER are required for macOS notarization"
            exit 1
          fi

          mkdir -p "$HOME/keys"
          if ! printf '%s' "$APPLE_API_KEY_B64" | base64 --decode > "$HOME/keys/AuthKey.p8" 2>/dev/null; then
            printf '%s' "$APPLE_API_KEY_B64" | base64 -D > "$HOME/keys/AuthKey.p8"
          fi
          echo "APPLE_API_KEY=$HOME/keys/AuthKey.p8" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID_VALUE" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=$APPLE_API_ISSUER_VALUE" >> "$GITHUB_ENV"
          echo "Apple notarization API key loaded"

      - name: Build macOS installer
        run: npm run dist:mac

      - name: Collect DMG
        run: |
          set -euo pipefail
          mkdir -p release-assets
          dmg_found=false
          while IFS= read -r f; do
            cp "$f" release-assets/
            dmg_found=true
          done < <(find dist release -type f -name "*.dmg" 2>/dev/null || true)
          if [[ "$dmg_found" != true ]]; then
            echo "No .dmg file found under dist/ or release/"
            exit 1
          fi
          ls -la release-assets

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-macos
          path: release-assets/*.dmg
          if-no-files-found: error

  build-windows:
    name: Build Windows EXE
    if: github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create runtime env file
        shell: pwsh
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || secrets.VITE_API_URL }}
          VITE_DESKTOP_UPDATES_URL: ${{ vars.VITE_DESKTOP_UPDATES_URL || secrets.VITE_DESKTOP_UPDATES_URL }}
          VITE_DESKTOP_PRERELEASE_UPDATES_URL: ${{ vars.VITE_DESKTOP_PRERELEASE_UPDATES_URL || secrets.VITE_DESKTOP_PRERELEASE_UPDATES_URL }}
          VITE_DESKTOP_DOWNLOAD_BASE_URL: ${{ vars.VITE_DESKTOP_DOWNLOAD_BASE_URL || secrets.VITE_DESKTOP_DOWNLOAD_BASE_URL }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
        run: |
          $updatesUrl = $env:VITE_DESKTOP_UPDATES_URL
          if ($env:RELEASE_CHANNEL -eq "prerelease") {
            $updatesUrl = $env:VITE_DESKTOP_PRERELEASE_UPDATES_URL
            if ([string]::IsNullOrWhiteSpace($updatesUrl) -and -not [string]::IsNullOrWhiteSpace($env:VITE_DESKTOP_UPDATES_URL)) {
              $updatesUrl = $env:VITE_DESKTOP_UPDATES_URL.Replace("desktop/latest/latest.json", "desktop/prerelease/latest.json")
              if ($updatesUrl -eq $env:VITE_DESKTOP_UPDATES_URL) {
                $updatesUrl = ""
              }
            }
          }

          if ([string]::IsNullOrWhiteSpace($env:VITE_API_URL)) {
            throw "Missing GitHub Actions variable: VITE_API_URL"
          }
          if ([string]::IsNullOrWhiteSpace($updatesUrl)) {
            throw "Missing GitHub Actions variable: VITE_DESKTOP_UPDATES_URL"
          }

          $runtimeEnv = @(
            "VITE_API_URL=$env:VITE_API_URL",
            "VITE_DESKTOP_UPDATES_URL=$updatesUrl",
            "VOXLY_DEBUG=0"
          )
          if (-not [string]::IsNullOrWhiteSpace($env:VITE_DESKTOP_DOWNLOAD_BASE_URL)) {
            $runtimeEnv += "VITE_DESKTOP_DOWNLOAD_BASE_URL=$env:VITE_DESKTOP_DOWNLOAD_BASE_URL"
          }
          if (-not [string]::IsNullOrWhiteSpace($env:VITE_POSTHOG_KEY)) {
            $runtimeEnv += "VITE_POSTHOG_KEY=$env:VITE_POSTHOG_KEY"
          }
          if (-not [string]::IsNullOrWhiteSpace($env:VITE_POSTHOG_HOST)) {
            $runtimeEnv += "VITE_POSTHOG_HOST=$env:VITE_POSTHOG_HOST"
          }

          $runtimeEnv | Set-Content -Path resources/runtime.env -Encoding utf8

      - name: Build Windows installer
        run: npm run dist:win

      - name: Validate Windows bundled assets
        run: node scripts/validate-windows-package.js

      - name: Collect EXE
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null

          $setupFiles = Get-ChildItem -Path dist -Recurse -File -Filter *.exe |
            Where-Object { $_.FullName -notmatch 'win-unpacked' -and $_.Name -match 'Setup|setup' }

          if (-not $setupFiles) {
            $setupFiles = Get-ChildItem -Path dist -Recurse -File -Filter *.exe |
              Where-Object { $_.FullName -notmatch 'win-unpacked' }
          }

          if (-not $setupFiles) {
            Write-Error "No installer .exe file found under dist/."
            exit 1
          }

          foreach ($f in $setupFiles) {
            Copy-Item -Path $f.FullName -Destination release-assets
          }

          Get-ChildItem release-assets

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: release-assets/*.exe
          if-no-files-found: error

  publish-assets:
    name: Publish To Release And R2
    if: github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: installer-macos
          path: upload-assets

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: installer-windows
          path: upload-assets

      - name: List collected assets
        run: |
          set -euo pipefail
          ls -la upload-assets

      - name: Attach installers to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            upload-assets/*.dmg
            upload-assets/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install AWS CLI
        run: |
          set -euo pipefail
          if ! command -v aws >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y awscli
          fi
          aws --version

      - name: Validate R2 credentials
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${AWS_ACCESS_KEY_ID:-}" ]]; then
            echo "Missing GitHub secret: R2_ACCESS_KEY_ID"
            exit 1
          fi
          if [[ -z "${AWS_SECRET_ACCESS_KEY:-}" ]]; then
            echo "Missing GitHub secret: R2_SECRET_ACCESS_KEY"
            exit 1
          fi

      - name: Upload installers to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          tag="${RELEASE_TAG}"
          version="${tag#v}"
          channel="${RELEASE_CHANNEL}"
          latest_prefix="desktop/latest"
          manifest_key="desktop/latest/latest.json"
          alias_suffix="latest"
          if [[ "$channel" == "prerelease" ]]; then
            latest_prefix="desktop/prerelease/latest"
            manifest_key="desktop/prerelease/latest.json"
            alias_suffix="prerelease"
          fi
          released_at="$(gh release view "$tag" --json publishedAt --jq '.publishedAt' 2>/dev/null || true)"
          if [[ -z "$released_at" || "$released_at" == "null" ]]; then
            released_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          fi
          files_json='[]'

          for file in upload-assets/*; do
            [ -f "$file" ] || continue
            base="$(basename "$file")"
            ext="${base##*.}"

            if [[ "$base" == *.dmg ]]; then
              os="mac"
            elif [[ "$base" == *.exe ]]; then
              os="windows"
            else
              continue
            fi

            release_key="desktop/releases/${tag}/${base}"
            latest_key="${latest_prefix}/${os}/${base}"
            alias_key="${latest_prefix}/${os}/dictafun-${os}-${alias_suffix}.${ext}"

            aws s3 cp "$file" "s3://${R2_BUCKET}/${release_key}" --endpoint-url "${R2_ENDPOINT}"
            aws s3 cp "$file" "s3://${R2_BUCKET}/${latest_key}" --endpoint-url "${R2_ENDPOINT}"
            aws s3 cp "$file" "s3://${R2_BUCKET}/${alias_key}" --endpoint-url "${R2_ENDPOINT}"

            files_json="$(jq -c --arg os "$os" --arg name "$base" --arg releaseKey "$release_key" --arg latestKey "$latest_key" --arg aliasKey "$alias_key" '. + [{os:$os,name:$name,releaseKey:$releaseKey,latestKey:$latestKey,aliasKey:$aliasKey}]' <<< "$files_json")"
          done

          jq -n \
            --arg tag "$tag" \
            --arg version "$version" \
            --arg channel "$channel" \
            --arg releasedAt "$released_at" \
            --arg bucket "$R2_BUCKET" \
            --arg endpoint "$R2_ENDPOINT" \
            --argjson files "$files_json" \
            '{tag:$tag,version:$version,channel:$channel,releasedAt:$releasedAt,bucket:$bucket,endpoint:$endpoint,files:$files}' > latest.json

          aws s3 cp latest.json "s3://${R2_BUCKET}/${manifest_key}" --endpoint-url "${R2_ENDPOINT}"
